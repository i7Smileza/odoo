<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer user odoo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://cdn.jsdelivr.net/npm/gasparesganga-jquery-loading-overlay@2.1.7/dist/loadingoverlay.min.js"></script>

  <style>
    body {
      font-family: 'Kanit', sans-serif;
      background-color: #f8f9fa;
      padding: 20px 0;
    }
    .list {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: auto;
    }
    /* ปรับขนาด Select2 ให้พอดีกับ Bootstrap */
    .select2-container .select2-selection--single {
      height: 38px !important;
      padding: 4px;
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 36px !important;
    }
  </style>
</head>
<body>

  <div class="container list">
    <h4 class="text-center mb-4"><i class="fa-solid fa-people-arrows"></i> แบบฟอร์มแจ้งย้ายสาขา</h4>
    <form id="myForm" class="needs-validation" novalidate onsubmit="event.preventDefault(); submitForm();">
      <div class="row justify-content-start g-3">

        <div class="col-12">
          <label for="name" class="form-label"><i class="fa-solid fa-user"></i> ชื่อ-สกุล</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="กรุณากรอก ชื่อ-สกุล" required>
        </div>

        <div class="col-12">
          <label for="id" class="form-label"><i class="fa fa-id-card-o"></i> รหัสพนักงาน</label>
          <input type="text" id="id" name="id" maxlength="10" class="form-control" placeholder="กรุณากรอก รหัสพนักงาน" required>
        </div>

        <div class="col-12">
          <label for="phone" class="form-label"><i class="fa-solid fa-phone"></i> เบอร์โทร</label>
          <input type="text" id="phone" name="phone" maxlength="10" class="form-control" placeholder="กรุณากรอก เบอร์โทร" required>
        </div>

        <div class="col-12">
          <label for="locationform" class="form-label"><i class="fa fa-rocket"></i> ย้ายจากสาขา</label>
          <select name="locationform" id="locationform" class="form-control select2" required style="width: 100%;">
            <option value="" selected disabled>-- กำลังโหลดข้อมูลสาขา... --</option>
          </select>
        </div>

        <div class="col-12">
          <label for="locationto" class="form-label"><i class="fa fa-map-marker"></i> ย้ายไปใช้ที่สาขา</label>
          <select name="locationto" id="locationto" class="form-control select2" required style="width: 100%;">
            <option value="" selected disabled>-- กำลังโหลดข้อมูลสาขา... --</option>
          </select>
        </div>

        <div class="col-12">
          <label for="transferReason" class="form-label"><i class="fa-solid fa-comment-dots"></i> เหตุผลการขอย้ายสาขา</label>
          <select name="transferReason" id="transferReason" class="form-select" required>
            <option value="" selected disabled>-- กำลังโหลดเหตุผล... --</option>
          </select>
        </div>

        <div class="col-12 mt-4">
          <button type="submit" class="btn btn-primary w-100 py-2"><i class="fa-solid fa-paper-plane"></i> ยืนยันการส่งข้อมูล</button>
        </div>

      </div>
    </form>
  </div>

  <script>
  $(document).ready(function() {
    // 1. เรียกใช้งาน Select2 เพื่อให้พิมพ์ค้นหาสาขาได้
    $('#locationform').select2({ placeholder: "พิมพ์เพื่อค้นหา หรือ เลือกสาขาต้นทาง" });
    $('#locationto').select2({ placeholder: "พิมพ์เพื่อค้นหา หรือ เลือกสาขาปลายทาง" });

    // 2. ดึงข้อมูลจาก Google Sheets 
    google.script.run.withSuccessHandler(function(data) {
      if(data.status === 'success') {
        let locSelect1 = $('#locationform');
        let locSelect2 = $('#locationto');
        locSelect1.empty().append('<option value="" selected disabled>-- เลือกสาขา --</option>');
        locSelect2.empty().append('<option value="" selected disabled>-- เลือกสาขา --</option>');
        
        // เติมข้อมูลสาขา
        data.locations.forEach(function(loc) {
          locSelect1.append(new Option(loc, loc));
          locSelect2.append(new Option(loc, loc));
        });

        // เติมข้อมูลเหตุผล
        let reasonSelect = $('#transferReason');
        reasonSelect.empty().append('<option value="" selected disabled>-- เลือกเหตุผลการย้าย --</option>');
        if(data.reasons.length === 0) {
          data.reasons = ["หน่วยแทน", "ช่วยงาน", "ย้ายไปประจำ"]; // ค่าสำรองถ้าใน Sheet ไม่มีข้อมูล
        }
        data.reasons.forEach(function(reason) {
          reasonSelect.append(new Option(reason, reason));
        });
      } else {
        console.error("Error:", data.message);
      }
    }).getDropdownData();
  });

  // 3. ฟังก์ชันสำหรับกดส่งข้อมูล
  function submitForm() {
    // เช็กว่ากรอกข้อมูลครบไหม
    var form = document.getElementById('myForm');
    if (!form.checkValidity()) {
      form.classList.add('was-validated');
      Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');
      return;
    }

    $.LoadingOverlay('show');
    
    // ดึงค่าที่ผู้ใช้กรอก
    let formData = {
      name: $('#name').val(),
      id: $('#id').val(),
      phone: $('#phone').val(),
      locationform: $('#locationform').val(),
      locationto: $('#locationto').val(),
      transferReason: $('#transferReason').val() 
    };

    // ส่งไปทำงานฝั่ง Code.gs
    // **จุดสำคัญ:** ตรวจสอบว่าใน Code.gs ของคุณฟังก์ชันเซฟข้อมูลชื่ออะไร (ปกติคือ saveData)
    google.script.run.withSuccessHandler(function(res) {
      $.LoadingOverlay('hide');
      Swal.fire({
        icon: 'success',
        title: 'บันทึกข้อมูลเรียบร้อย',
        showConfirmButton: false,
        timer: 1500
      }).then(() => {
        // รีเซ็ตฟอร์มหลังส่งเสร็จ
        form.reset();
        form.classList.remove('was-validated');
        $('#locationform').val(null).trigger('change');
        $('#locationto').val(null).trigger('change');
      });
    }).withFailureHandler(function(err) {
      $.LoadingOverlay('hide');
      Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
    }).saveData(formData); 
  }
  </script>

</body>
</html>
