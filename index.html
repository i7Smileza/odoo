<div class="container list">
  <form id="myForm" class="needs-validation my-4" novalidate>
    <div class="row justify-content-start g-3">

      <div class="col-12">
        <label for="name"><i class="fa-solid fa-user"></i> ชื่อ-สกุล</label>
        <input type="text" id="name" name="name" class="form-control" placeholder="ชื่อ-สกุล" required>
        <div class="invalid-feedback">กรุณากรอกชื่อ-สกุล</div>
      </div>

      <div class="col-12">
        <label for="id"><i class="fa fa-id-card-o"></i> รหัสพนักงาน</label>
        <input type="text" id="id" name="id" maxlength="10" class="form-control" placeholder="กรุณากรอก รหัสพนักงาน" required>
        <div class="invalid-feedback">กรุณากรอกรหัสพนักงาน</div>
      </div>

      <div class="col-12">
        <label for="phone"><i class="fa-solid fa-phone"></i> เบอร์โทร</label>
        <input type="text" id="phone" name="phone" maxlength="10" class="form-control" placeholder="กรุณากรอก เบอร์โทร" required>
        <div class="invalid-feedback">กรุณากรอกเบอร์โทร</div>
      </div>

      <div class="col-12">
        <label for="locationform"><i class="fa fa-rocket"></i> ย้ายจากสาขา</label>
        <select name="locationform" id="locationform" class="form-control select2" required>
          <option value="" selected disabled>-- กำลังโหลดข้อมูลสาขา... --</option>
        </select>
        <div class="invalid-feedback">กรุณาเลือกสาขาต้นทาง</div>
      </div>

      <div class="col-12">
        <label for="locationto"><i class="fa fa-map-marker"></i> ย้ายไปใช้ที่สาขา</label>
        <select name="locationto" id="locationto" class="form-control select2" required>
          <option value="" selected disabled>-- กำลังโหลดข้อมูลสาขา... --</option>
        </select>
        <div class="invalid-feedback">กรุณาเลือกสาขาปลายทาง</div>
      </div>

      <div class="col-12">
        <label for="transferReason"><i class="fa-solid fa-comment-dots"></i> เหตุผลการขอย้ายสาขา</label>
        <select name="transferReason" id="transferReason" class="form-select" required>
          <option value="" selected disabled>-- กำลังโหลดเหตุผล... --</option>
        </select>
        <div class="invalid-feedback">กรุณาเลือกเหตุผลการย้าย</div>
      </div>

      <div class="col-12 mt-4">
        <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-paper-plane"></i> ยืนยันการส่งข้อมูล</button>
      </div>

    </div>
  </form>
</div>

<script>
$(document).ready(function() {
  
  // เรียกใช้งาน Select2 เพื่อให้พิมพ์ค้นหาสาขาได้ง่ายๆ
  $('#locationform').select2({ theme: 'bootstrap-5', placeholder: "พิมพ์ค้นหา หรือ เลือกสาขาต้นทาง" });
  $('#locationto').select2({ theme: 'bootstrap-5', placeholder: "พิมพ์ค้นหา หรือ เลือกสาขาปลายทาง" });

  // ดึงข้อมูลจาก Google Sheets ผ่านฟังก์ชัน getDropdownData()
  google.script.run.withSuccessHandler(function(data) {
    if(data.status === 'success') {
      
      // 1. เติมข้อมูล "สาขา" ในกล่องเลือกทั้ง 2 กล่อง
      let locSelect1 = $('#locationform');
      let locSelect2 = $('#locationto');
      locSelect1.empty().append('<option value="" selected disabled>-- เลือกสาขา --</option>');
      locSelect2.empty().append('<option value="" selected disabled>-- เลือกสาขา --</option>');
      
      data.locations.forEach(function(loc) {
        locSelect1.append(new Option(loc, loc));
        locSelect2.append(new Option(loc, loc));
      });

      // 2. เติมข้อมูล "เหตุผลการย้าย" ในกล่องเลือก
      let reasonSelect = $('#transferReason');
      reasonSelect.empty().append('<option value="" selected disabled>-- เลือกเหตุผลการย้าย --</option>');
      
      // หาก Sheet ไม่มีข้อมูล ให้ใช้ค่า Default 3 อย่างตามที่คุณต้องการ
      if(data.reasons.length === 0) {
        data.reasons = ["หน่วยแทน", "ช่วยงาน", "ย้ายไปประจำ"];
      }

      data.reasons.forEach(function(reason) {
        reasonSelect.append(new Option(reason, reason));
      });

    } else {
      console.error("Error fetching data:", data.message);
    }
  }).getDropdownData();

});

// ฟังก์ชัน Submit ส่งข้อมูล (ปรับแต่งเพื่อรับค่าเหตุผลด้วย)
function submit() {
  $.LoadingOverlay('show');
  
  // รวบรวมข้อมูลจากฟอร์ม
  let formData = {
    name: $('#name').val(),
    id: $('#id').val(),
    phone: $('#phone').val(),
    locationform: $('#locationform').val(),
    locationto: $('#locationto').val(),
    transferReason: $('#transferReason').val() // ค่าใหม่ที่เพิ่มเข้ามา
  };

  // ส่งข้อมูลไปบันทึก (ให้เปลี่ยนชื่อ saveData เป็นชื่อฟังก์ชันบันทึกของคุณถ้าชื่อต่างกัน)
  google.script.run.withSuccessHandler(function(res) {
    $.LoadingOverlay('hide');
    Swal.fire({
      icon: 'success',
      title: 'บันทึกข้อมูลเรียบร้อย',
      showConfirmButton: false,
      timer: 1500
    }).then(() => {
      document.getElementById("myForm").reset();
      $('#locationform').val(null).trigger('change');
      $('#locationto').val(null).trigger('change');
    });
  }).withFailureHandler(function(err) {
    $.LoadingOverlay('hide');
    Swal.fire({
      icon: 'error',
      title: 'เกิดข้อผิดพลาด',
      text: err.message
    });
  }).saveData(formData); // ตรวจสอบชื่อฟังก์ชัน saveData ฝั่ง GS ของคุณด้วย
}
</script>
